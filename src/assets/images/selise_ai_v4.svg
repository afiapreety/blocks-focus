<svg width="640" height="120" viewBox="0 0 640 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .primary { fill: hsl(218, 78%, 32%); }
    .text-primary { fill: hsl(218, 78%, 32%); font-weight: 600; }
    .text-secondary { fill: #6B7280; font-weight: 500; }
  </style>

  <!-- Icon container -->
  <rect x="20" y="20" width="80" height="80" rx="18" fill="hsl(218, 78%, 32%)" opacity="0.08"/>

  <!-- Task List Icon -->
  <g transform="translate(34, 34)">
    <!-- Lines -->
    <rect x="20" y="3" width="36" height="4" rx="2" class="primary" opacity="0.7"/>
    <rect x="20" y="20" width="36" height="4" rx="2" class="primary" opacity="0.7"/>
    <rect x="20" y="37" width="36" height="4" rx="2" class="primary" opacity="0.7"/>

    <!-- Checkboxes -->
    <rect x="0" y="0" width="12" height="12" rx="3" class="primary"/>
    <rect x="0" y="17" width="12" height="12" rx="3" class="primary" opacity="0.6"/>
    <rect x="0" y="34" width="12" height="12" rx="3" class="primary" opacity="0.4"/>

    <!-- Check mark -->
    <path d="M3 6 L6 10 L10 4" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="120" y="72"
        font-size="40"
        font-family="Inter, SF Pro Display, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        letter-spacing="-0.3">
    <tspan class="text-primary">Blocks</tspan>
    <tspan dx="6" class="text-secondary">Focus</tspan>
  </text>
</svg>